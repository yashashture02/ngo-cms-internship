<!DOCTYPE html>
<html>
<head>
    <title>SevaConnect NGO Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
        }

        /* 🔥 NAVBAR */
        .navbar {
            padding: 12px 30px;
            background: #ffffff !important;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 20px;
            display: flex;
            align-items: center;
            color: #0d6efd !important;
        }

        .logo {
            width: 32px;
            margin-right: 8px;
        }

        .nav-link {
            margin-right: 20px;
            color: #333 !important;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #0d6efd !important;
        }

        .logout-link {
            color: #dc3545 !important;
            font-weight: 600;
        }

        /* HERO */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                        url('https://images.unsplash.com/photo-1588072432836-e10032774350');
            background-size: cover;
            background-position: center;
            padding: 100px 40px;
            border-radius: 12px;
            text-align: center;
            color: white;
        }

        /* CARDS */
        .section-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }

        .hover-box {
            transition: 0.3s;
        }

        .hover-box:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        /* BUTTON */
        .btn {
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* FOOTER */
        footer {
            background: #020617;
            color: #cbd5f5;
        }
    </style>
</head>

<body>

<!-- 🔥 CLEAN NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
  <div class="container">

    <!-- LOGO + NAME -->
    <a class="navbar-brand" href="/">
        <img class="logo" src="https://cdn-icons-png.flaticon.com/512/1256/1256650.png">
        SevaConnect
    </a>

    <!-- RIGHT SIDE -->
    <div class="ms-auto d-flex align-items-center">

        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/events/">Events</a>

        {% if user.is_authenticated %}
            <a class="nav-link" href="/add-event/">Add Event</a>
            <a class="nav-link" href="/donate/">Donate</a>
            <a class="nav-link logout-link" href="/logout/">Logout</a>
        {% else %}
            <a class="nav-link" href="/login/">Login</a>
            <a class="nav-link" href="/register/">Register</a>
        {% endif %}

    </div>

  </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="text-center mt-5 p-3">
    <p>© 2026 SevaConnect NGO | Built by Yash</p>
</footer>

</body>
</html>
