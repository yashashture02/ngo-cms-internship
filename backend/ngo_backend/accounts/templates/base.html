<!DOCTYPE html>
<html>
<head>
    <title>NGO CMS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
        }

        .navbar {
            background-color: #333;
            padding: 15px;
        }

        .navbar a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: yellow;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        h3 {
            color: #333;
        }

        p {
            color: #555;
            margin: 5px 0;
        }

        .btn {
            background:#007BFF;
            color:white;
            padding:10px 15px;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
        }

        .edit-btn {
            background:#28a745;
            color:white;
            padding:6px 10px;
            border-radius:6px;
            text-decoration:none;
        }

        .delete-btn {
            background:#dc3545;
            color:white;
            padding:6px 10px;
            border-radius:6px;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/dashboard/">Dashboard</a>
    <a href="/events/">Events</a>
    <a href="/logout/">Logout</a>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
