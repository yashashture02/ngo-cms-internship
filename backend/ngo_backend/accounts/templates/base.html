<!DOCTYPE html>
<html>
<head>
    <title>Helping Hands NGO</title>

    <!-- 🔥 GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
        }

        /* 🔥 NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
        }

        /* LOGO */
        .logo a {
            text-decoration: none;
            color: #38bdf8;
            font-size: 22px;
            font-weight: 600;
        }

        /* NAV LINKS */
        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: white;
            margin-left: 25px;
            text-decoration: none;
            font-weight: 400;
            position: relative;
        }

        /* UNDERLINE HOVER */
        .nav-links a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #38bdf8;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* LOGOUT */
        .logout {
            color: #f87171 !important;
            font-weight: 500;
        }

        /* MAIN CONTAINER */
        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        /* CARD */
        .card {
            background: white;
            padding: 25px;
            margin: 25px 0;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        /* TEXT */
        h2 {
            text-align: center;
            color: white;
            font-weight: 600;
        }

        h3 {
            color: #0f172a;
        }

        p {
            color: #475569;
        }

        /* BUTTONS */
        .btn {
            background: #3b82f6;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #2563eb;
        }

        .edit-btn {
            background: #22c55e;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
        }

        .edit-btn, .delete-btn {
            margin-right: 8px;
        }

        /* INPUTS */
        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            font-family: 'Poppins', sans-serif;
        }

        /* FORM CENTER FIX */
        .form-center {
            max-width: 400px;
            margin: auto;
        }

    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<div class="navbar">

    <div class="logo">
        <a href="/dashboard/">🤝 HELPING HANDS NGO</a>
    </div>

    <div class="nav-links">
        <a href="/dashboard/">Dashboard</a>
        <a href="/events/">Events</a>
        <a href="/events/add/">Add Event</a>
        <a href="/events/donate/">Donate</a>
        <a href="/logout/" class="logout">Logout</a>
    </div>

</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
