<!DOCTYPE html>
<html>
<head>
    <title>Helping Hands NGO</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(15, 23, 42, 0.9);
        }

        .logo a {
            text-decoration: none;
            color: #38bdf8;
            font-size: 22px;
            font-weight: 600;
        }

        .nav-links a {
            color: white;
            margin-left: 25px;
            text-decoration: none;
        }

        .logout {
            color: #f87171 !important;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        .card {
            background: white;
            padding: 25px;
            margin: 25px 0;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: white;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">
        <a href="/dashboard/">🤝 HELPING HANDS NGO</a>
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
        <a href="/events/">Events</a>
        <a href="/events/add/">Add Event</a>
        <a href="/events/donate/">Donate</a>
        <a href="/logout/" class="logout">Logout</a>
    </div>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer style="text-align:center; color:white; padding:20px;">
    <p>© 2026 HELPING HANDS NGO | Made with ❤️</p>
</footer>

</body>
</html>
