{% extends "base.html" %}
{% block content %}

<h2>📊 NGO Dashboard</h2>

<p style="text-align:center; color:#cbd5f5;">
    Making the world better through small contributions 💖
</p>

<div class="card">
    <h3>Total Events</h3>
    <p>{{ total_events }}</p>
</div>

<div class="card">
    <h3>Total Donations</h3>
    <p>{{ total_donations }}</p>
</div>

<div class="card">
    <h3>Total Amount</h3>
    <p>₹ {{ total_amount }}</p>
</div>

{% endblock %}
