{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <h2 class="text-center mb-4">All Events</h2>

    <div class="row">

        {% for event in events %}

        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100">

                {% if event.image %}
                    <img src="{{ event.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
                {% else %}
                    <img src="https://via.placeholder.com/300x200" class="card-img-top">
                {% endif %}

                <div class="card-body d-flex flex-column">
                    <h5>{{ event.title }}</h5>
                    <p>{{ event.description }}</p>
                    <p><strong>Date:</strong> {{ event.date }}</p>

                    <div class="mt-auto">
                        <a href="/event/{{ event.id }}/" class="btn btn-primary w-100 mb-2">View</a>
                        <a href="/donate/" class="btn btn-success w-100">Donate</a>
                    </div>
                </div>

            </div>
        </div>

        {% empty %}
            <p class="text-center">No events available</p>
        {% endfor %}

    </div>
</div>

{% endblock %}
