{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mb-4">All Events</h2>

<!-- 🔍 SEARCH BAR -->
<form method="GET" class="mb-4 text-center">
    <input type="text" name="q" placeholder="Search events..." class="form-control w-50 d-inline">
    <button class="btn btn-primary">Search</button>
</form>

<div class="row">

    {% for event in events %}

    <div class="col-md-4 mb-4">
        <div class="card hover-box h-100 text-dark">

            {% if event.image %}
                <img src="{{ event.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
            {% endif %}

            <div class="card-body d-flex flex-column">
                <h5>{{ event.title }}</h5>
                <p>{{ event.description }}</p>
                <p><strong>Date:</strong> {{ event.date }}</p>

                <div class="mt-auto d-grid gap-2">
                    <a href="/event/{{ event.id }}/" class="btn btn-primary">View</a>
                    <a href="/edit-event/{{ event.id }}/" class="btn btn-warning">Edit</a>
                    <a href="/donate/" class="btn btn-success">Donate</a>
                </div>
            </div>

        </div>
    </div>

    {% empty %}
        <p>No events found</p>
    {% endfor %}

</div>

{% endblock %}
