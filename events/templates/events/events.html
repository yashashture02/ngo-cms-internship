{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mb-4">All Events</h2>

<!-- 🔍 SEARCH -->
<form method="GET" class="text-center mb-4">
    <input type="text" name="q" placeholder="Search events..." class="form-control w-50 d-inline">
    <button class="btn btn-primary mt-2">Search</button>
</form>

<div class="row">

    {% for event in events %}

    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm text-dark">

            {% if event.image %}
                <img src="{{ event.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
            {% endif %}

            <div class="card-body d-flex flex-column">
                <h5>{{ event.title }}</h5>
                <p>{{ event.description }}</p>
                <p><strong>Date:</strong> {{ event.date }}</p>

                <div class="mt-auto">
                    <a href="/event/{{ event.id }}/" class="btn btn-primary w-100 mb-2">View</a>
                    <a href="/donate/" class="btn btn-success w-100">Donate</a>
                    <a href="/delete-event/{{ event.id }}/" class="btn btn-danger w-100">Delete</a>
                </div>
            </div>

        </div>
    </div>

    {% empty %}
        <p class="text-center">No events found</p>
    {% endfor %}

</div>

{% endblock %}
