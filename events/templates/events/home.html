{% extends 'base.html' %}

{% block content %}

<h1 class="text-center mb-4">Upcoming Events</h1>

<div class="row">
    {% for event in events %}
    <div class="col-md-4">
        <div class="card mb-4 shadow">
            <div class="card-body">
                <h5>{{ event.title }}</h5>
                <p>{{ event.description }}</p>
                <p><strong>Date:</strong> {{ event.date }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
