{% extends "base.html" %}
{% block content %}

<h2>Donate</h2>

<div class="card">
<form method="POST">
    {% csrf_token %}

    <input class="form-control mb-3" name="name" placeholder="Your Name">
    <input class="form-control mb-3" name="amount" placeholder="Amount">
    <input class="form-control mb-3" name="message" placeholder="Message">

    <a href="/donate/" class="btn btn-success w-100 mt-2">Donate</a>
</form>
</div>

{% endblock %}
