{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card p-4">

        {% if event.image %}
            <img src="{{ event.image.url }}" class="img-fluid mb-3">
        {% endif %}

        <h2>{{ event.title }}</h2>
        <p>{{ event.description }}</p>
        <p><strong>Date:</strong> {{ event.date }}</p>

        <a href="/donate/" class="btn btn-success mt-3">Donate</a>

    </div>

</div>

{% endblock %}
