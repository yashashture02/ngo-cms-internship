{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card p-4 text-dark">

        {% if event.image %}
            <img src="{{ event.image.url }}" class="img-fluid mb-3">
        {% endif %}

        <h2>{{ event.title }}</h2>
        <p>{{ event.description }}</p>
        <p><strong>Date:</strong> {{ event.date }}</p>

        <!-- 🔥 BUTTONS -->
        <div class="mt-3 d-grid gap-2">
            <a href="/edit-event/{{ event.id }}/" class="btn btn-warning">Edit Event</a>
            <a href="/donate/" class="btn btn-success">Donate</a>
            <a href="/events/" class="btn btn-secondary">Back</a>
        </div>

    </div>

</div>

{% endblock %}
